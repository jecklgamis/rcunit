name: publish-apt

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake libtool build-essential \
            debhelper dh-autoreconf devscripts reprepro gnupg lintian pkg-config

      - name: Resolve versions from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"           # e.g. v1.2.3 or v1.2.3-beta.1
          VERSION="${TAG#v}"                 # e.g. 1.2.3 or 1.2.3-beta.1

          # Semver pre-release (1.2.3-beta.1) uses - but Debian uses ~ for pre-releases.
          # Convert: 1.2.3-beta.1 -> 1.2.3~beta.1-1 (sorts before 1.2.3-1 in apt)
          if [[ "$VERSION" =~ ^([0-9]+\.[0-9]+\.[0-9]+)-(.+)$ ]]; then
            DEB_VERSION="${BASH_REMATCH[1]}~${BASH_REMATCH[2]}-1"
          else
            DEB_VERSION="${VERSION}-1"
          fi

          echo "version=${VERSION}"         >> "$GITHUB_OUTPUT"
          echo "deb_version=${DEB_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Inject version into configure.ac
        run: |
          sed -i "s/AC_INIT(\[rcunit\],\[[^]]*\]/AC_INIT([rcunit],[${{ steps.version.outputs.version }}]/" configure.ac

      - name: Add debian/changelog entry
        run: |
          dch --newversion "${{ steps.version.outputs.deb_version }}" \
              --distribution stable \
              --force-distribution \
              "Release ${{ steps.version.outputs.version }}"

      - name: Run autogen
        run: ./autogen.sh

      - name: Build .deb package
        run: |
          dpkg-buildpackage -us -uc -b
          mkdir -p dist
          mv ../librcunit-dev_*.deb dist/

      - name: Lint package
        run: lintian dist/*.deb || true

      - name: Import GPG signing key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          gpg --list-secret-keys

      - name: Restore existing apt repo from gh-pages
        id: restore-pages
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: apt-repo-site

      - name: Initialize apt repo directory
        if: steps.restore-pages.outcome == 'failure'
        run: mkdir -p apt-repo-site

      - name: Sync reprepro config
        run: |
          mkdir -p apt-repo-site/conf
          cp apt-repo/conf/distributions apt-repo-site/conf/distributions
          cp apt-repo/conf/options apt-repo-site/conf/options

      - name: Add package to apt repo
        run: reprepro -b apt-repo-site includedeb stable dist/*.deb

      - name: Export GPG public key
        run: gpg --armor --export > apt-repo-site/public.key

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: apt-repo-site
          clean: false
          commit-message: "Publish ${{ github.ref_name }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.deb
          generate_release_notes: true
