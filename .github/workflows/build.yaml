name: build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout rcunit
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool build-essential

      - name: Run autogen
        run: ./autogen.sh

      - name: Configure
        run: ./configure

      - name: Build
        run: make all

      - name: Run tests
        run: make check
